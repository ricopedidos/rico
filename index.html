<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>RICO</h1>
<p class="subtitulo">Hace tu pedido</p>

<div id="carrito">
    🛒 Carrito (<span id="cantidad-carrito">0</span>)
</div>

<div id="detalle-carrito">
    <h2>Tu pedido</h2>

    <ul id="lista-carrito"></ul>

    <h3>
        Total: $<span id="total">0</span>
    </h3>

    <button id="btn-whatsapp" onclick="enviarWhatsApp()">
    Pedir por WhatsApp
    </button>
    

    <input
    type="text"
    id="direccion"
    placeholder="Dirección de entrega">

    <textarea
    id="observaciones"
    placeholder="Observaciones (opcional)"></textarea>

    <button id="btn-ubicacion" onclick="obtenerUbicacion()">
    📍 Compartir ubicación
    </button>

    <input
    type="hidden"
    id="ubicacion">

    <button id="btn-vaciar" onclick="vaciarCarrito()">
    🗑 Vaciar carrito
    </button>

</div>

<div id="filtros">
    <button class="activo" onclick="filtrar('todos')">Todos</button>
    <button onclick="filtrar('bebidas')">Bebidas</button>
    <button onclick="filtrar('comidas')">Comidas</button>
    <button onclick="filtrar('helados')">Helados</button>
</div>

    <input
    type="text"
    id="buscador"
    placeholder="🔍 Buscar productos..."
    onkeyup="buscarProductos()">

    <div id="productos"></div>

    <script type="module" src="app.js"></script>

</body>
</html>
